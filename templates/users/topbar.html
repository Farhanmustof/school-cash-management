<header
  class="h-20 bg-white border-b border-slate-100 flex items-center justify-between px-8 z-10 sticky top-0 shadow-sm"
>
  <div class="flex items-center">
    <button
      class="md:hidden mr-4 text-slate-600 hover:text-blue-600 transition"
    >
      <i class="fas fa-bars text-xl"></i>
    </button>

    <div>
      <h2
        class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] mb-0.5"
      >
        Sistem Kas Sekolah
      </h2>
      <p class="text-sm font-bold text-slate-800">
        {% block breadcrumb %}Dashboard{% endblock %}
      </p>
    </div>
  </div>

  <div class="flex items-center space-x-6">
    <div class="flex items-center gap-3 pl-6 border-l border-slate-100">
      <div class="text-right hidden md:block">
        <p class="text-sm font-bold text-slate-800 leading-tight">
          {{ user.get_full_name|default:user.username }}
        </p>
        <div class="flex items-center justify-end gap-1.5 mt-0.5">
          <span class="w-1.5 h-1.5 bg-green-500 rounded-full"></span>
          <p
            class="text-[10px] text-slate-400 font-bold uppercase tracking-tighter"
          >
            Online
          </p>
        </div>
      </div>
      <div
        class="w-10 h-10 rounded-xl bg-gradient-to-br from-slate-50 to-slate-100 flex items-center justify-center text-slate-400 border border-slate-200 shadow-sm"
      >
        <i class="fas fa-user-circle text-lg"></i>
      </div>
    </div>
  </div>
</header>
