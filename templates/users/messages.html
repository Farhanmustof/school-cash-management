{% if messages %}
<div class="space-y-4 mb-6">
  {% for message in messages %}
  <div
    class="p-4 rounded-xl shadow-sm border {% if message.tags == 'success' %}bg-green-50 border-green-100 text-green-800{% elif message.tags == 'error' %}bg-red-50 border-red-100 text-red-800{% else %}bg-blue-50 border-blue-100 text-blue-800{% endif %}"
  >
    <div class="flex items-center">
      <i
        class="fas {% if message.tags == 'success' %}fa-check-circle{% elif message.tags == 'error' %}fa-exclamation-circle{% else %}fa-info-circle{% endif %} mr-3"
      ></i>
      <p class="text-sm font-medium">{{ message }}</p>
    </div>
  </div>
  {% endfor %}
</div>
{% endif %}
