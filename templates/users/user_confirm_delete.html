{% extends 'users/base.html' %} {% block content %}
<div class="p-6 max-w-lg mx-auto text-center">
  <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-8">
    <div
      class="w-16 h-16 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-4"
    >
      <i class="fas fa-exclamation-triangle text-2xl"></i>
    </div>
    <h1 class="text-xl font-bold text-slate-800 mb-2">Konfirmasi Hapus</h1>
    <p class="text-slate-500 mb-6">
      Apakah Anda yakin ingin menghapus user
      <strong>{{ object.username }}</strong>? Tindakan ini tidak dapat
      dibatalkan.
    </p>

    <form method="post">
      {% csrf_token %}
      <div class="flex flex-col space-y-3">
        <button
          type="submit"
          class="bg-red-600 hover:bg-red-700 text-white px-6 py-2 rounded-lg font-semibold transition"
        >
          Ya, Hapus Permanen
        </button>
        <a
          href="{% url 'users:user_list' %}"
          class="text-slate-500 hover:text-slate-800 text-sm font-medium"
        >
          Batalkan
        </a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
