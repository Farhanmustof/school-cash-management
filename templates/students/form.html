{% extends 'users/base.html' %} {% block content %}
<div class="max-w-2xl mx-auto">
  <div class="mb-8">
    <h1 class="text-3xl font-extrabold text-slate-800 tracking-tight">
      {{ title }}
    </h1>
    <p class="text-slate-500 text-sm">
      Isi data siswa dengan lengkap dan benar.
    </p>
  </div>

  <div class="bg-white rounded-3xl shadow-xl border border-slate-100 p-8">
    <form method="POST" enctype="multipart/form-data" class="space-y-6">
      {% csrf_token %} {% for field in form %}
      <div class="flex flex-col gap-1.5">
        <label class="text-xs font-bold text-slate-700 ml-1"
          >{{ field.label }}</label
        >
        {{ field }} {% if field.errors %}
        <p class="text-[10px] text-red-500 font-bold ml-1">
          {{ field.errors.0 }}
        </p>
        {% endif %}
      </div>
      {% endfor %}
      <div class="pt-6 flex justify-end gap-3 border-t border-slate-50">
        <a
          href="{% url 'students:list' %}"
          class="px-6 py-2.5 text-sm font-bold text-slate-500 hover:bg-slate-100 rounded-xl transition"
          >Batal</a
        >
        <button
          type="submit"
          class="bg-blue-600 text-white px-8 py-2.5 rounded-xl text-sm font-bold shadow-lg hover:bg-blue-700 transition"
        >
          Simpan
        </button>
      </div>
    </form>
  </div>
</div>

<script>
  document.querySelectorAll("input, select, textarea").forEach((el) => {
    el.classList.add(
      "w-full",
      "px-4",
      "py-3",
      "rounded-xl",
      "bg-slate-50",
      "border",
      "border-slate-200",
      "focus:ring-4",
      "focus:ring-blue-500/10",
      "outline-none",
      "text-sm",
      "transition",
    );
  });
</script>
{% endblock %}
