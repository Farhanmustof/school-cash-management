{% extends 'users/base.html' %} {% block content %}
<div class="max-w-lg mx-auto mt-10">
  <div
    class="bg-white rounded-2xl shadow-xl border border-slate-100 overflow-hidden"
  >
    <div class="p-8 text-center">
      <div
        class="w-20 h-20 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-6"
      >
        <i class="fas fa-exclamation-triangle text-3xl"></i>
      </div>

      <h2 class="text-2xl font-extrabold text-slate-800 mb-2">
        Konfirmasi Hapus
      </h2>
      <p class="text-slate-500 mb-6">
        Apakah Anda yakin ingin menghapus data siswa
        <span class="font-bold text-slate-800">{{ student.full_name }}</span>?
        Tindakan ini tidak dapat dibatalkan.
      </p>

      <form method="POST" class="flex flex-col gap-3">
        {% csrf_token %}
        <button
          type="submit"
          class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 rounded-xl transition shadow-lg"
        >
          Ya, Hapus Sekarang
        </button>
        <a
          href="{% url 'students:list' %}"
          class="w-full bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold py-3 rounded-xl transition"
        >
          Batal
        </a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
